# CBE Lesson Plan Template Configuration
# Based on Kenya Competency-Based Curriculum

template_file: "templates/cbe_lesson_template.md"

# Template Type
template_type: "kenya_cbe_phenomenon_driven"
grade_level: "10-12"
curriculum: "Kenya CBC/CBE"

# Required Sections per Lesson
required_lesson_sections:
  - "Specific Learning Outcomes"
  - "Overview"
  - "Lesson Implementation Framework"
  - "Teacher Reflection"
  - "Summary Table Prompt"

# Required columns in Implementation Framework (5-column)
required_framework_columns:
  - "Learner Experience"
  - "Resource Link"
  - "Teacher Moves"
  - "Sensemaking Strategy"
  - "Formative Assessment"

# Learning Outcomes Categories
learning_outcomes_categories:
  - "Knowledge"
  - "Skills"
  - "Attitudes"
  - "Science and Engineering Practices"

# Overview Components
overview_components:
  - "Key Inquiry Question"
  - "Purpose in Storyline"
  - "Safety Notes"

# Pedagogical Features
pedagogical_features:
  poe_cycles: true  # Predict-Observe-Explain
  dqb: true  # Driving Questions Board
  model_revision: true
  think_pair_share: true
  formative_assessment: true
  summary_table: true

# Resource Types
resource_types:
  - "VIDEO"
  - "READING"
  - "INTERACTIVE"
  - "SIMULATION"
  - "Laboratory experiment"
  - "ARES resources"

# Kenyan Context Requirements
kenyan_context:
  required: true
  currency: "KSh"
  examples:
    - "KPLC (Kenya Power & Lighting Company)"
    - "Kenyan shillings (KSh)"
    - "Local schools and contexts"
    - "Kenya healthcare system"
    - "Kenyan agriculture"
  
# Teacher Facilitation Style
teacher_facilitation:
  style: "facilitating_not_lecturing"
  required_elements:
    - "Probing questions"
    - "Wait time (5-15 seconds)"
    - "Think-Pair-Share"
    - "Circulating and guiding"
    - "Eliciting student ideas"
  
# Assessment Format
assessment_format:
  use_checkboxes: true  # ☐ symbol
  checkbox_symbol: "☐"
  formative_types:
    - "Observation"
    - "Questions"
    - "Exit tickets"
    - "Quick checks"
    - "Peer assessment"

# Quality Requirements
quality_checks:
  min_table_rows_in_framework: 3
  require_specific_examples: true
  require_kenyan_context: true
  require_ares_placeholders: true
  min_words_per_table_cell: 10
  require_teacher_reflection: true
  require_summary_table_prompt: true

# Storyline Requirements
storyline:
  requires_phenomenon: true
  requires_driving_question: true
  requires_evidence_progression: true
  requires_model_building: true

# Document Structure
sub_strand_overview_required: true
lesson_count_typical: 12
duration_typical_periods: 40

# Core Competencies (Kenya CBC)
core_competencies:
  - "Communication and Collaboration"
  - "Critical Thinking and Problem Solving"
  - "Self-efficacy"
  - "Digital Literacy"
  - "Learning to Learn"
  - "Creativity and Innovation"

# Values (Kenya CBC)
values:
  - "Responsibility"
  - "Respect"
  - "Integrity"
  - "Excellence"
  - "Unity"
  - "Patriotism"

# Output Format
output_format: "html"
html_requirements:
  use_html_tables: true
  no_markdown_tables: true
  proper_table_syntax: true
  include_all_sections: true
