# ares_scan_config.yaml
# Kenya CBE Lesson Plan Generation System — ARES Content Index
# Configured for jhm-spark (paths via symlinks matching original ARES paths)

# ─── Content Sources ──────────────────────────────────────────────────────────

content_sources:

  - name: "ARES Web"
    path: "/mnt/sda3/var/www/modules"
    type: "web"

  - name: "Kiwix"
    path: "/mnt/sda3/var/Downloads2/Data/Currentcontent"
    type: "kiwix"
    scan_articles: true
    skip_zim_above_gb: 20
    max_articles_per_zim: 2000
    scan_zim_patterns:
      - "wikipedia_en_chemistry_*.zim"
      - "wikipedia_en_physics_*.zim"
      - "wikipedia_en_mathematics_*.zim"
      - "wikipedia_en_for_schools_*.zim"
      - "wikipedia_en_astronomy_*.zim"
      - "khan-academy-videos_en_*.zim"
      - "boundless-*.zim"
      - "ted_en_playlist-*.zim"
      - "ubongo_*.zim"

  - name: "Kolibri"
    path: "/mnt/sda3/Kolibri_Data-current/Content"
    type: "kolibri"


# ─── Output ───────────────────────────────────────────────────────────────────

output_db: "/home/markk/ares/cbe-generation-system/data/ares_index/ares_content.db"
output_json_dir: "/home/markk/ares/cbe-generation-system/data/ares_index/"
log_file: "/home/markk/ares/cbe-generation-system/data/ares_index/scan.log"


# ─── Whisper Transcript Integration ──────────────────────────────────────────

whisper_transcript_root: "/mnt/sda3/var/www/modules"
whisper_output_format: "json"
whisper_mirror_tree: false
store_transcript_text: true
transcript_text_limit: 20000


# ─── File Extensions (Web source only) ────────────────────────────────────────

file_extensions:
  video:   [".mp4", ".webm", ".ogv", ".m4v"]
  audio:   [".mp3", ".ogg", ".wav", ".m4a"]
  pdf:     [".pdf"]
  html:    [".html", ".htm"]
  image:   [".jpg", ".jpeg", ".png", ".gif", ".svg", ".webp"]
  transcript: [".srt", ".vtt"]
  transcript_json: [".json"]

skip_directories:
  - ".git"
  - "__pycache__"
  - "node_modules"
  - "thumbs"
  - "thumbnails"
  - "cache"
  - "tmp"
  - ".DS_Store"

max_extract_size_mb: 10


